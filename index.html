<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARQUES BH — Atlas Verde de Belo Horizonte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="header__mark">
      <svg viewBox="0 0 40 40" class="header__glyph" aria-hidden="true">
        <path d="M20 4 C12 4 6 12 6 18 C6 26 20 36 20 36 C20 36 34 26 34 18 C34 12 28 4 20 4 Z" fill="none"
          stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
        <circle cx="20" cy="18" r="5" fill="none" stroke="currentColor" stroke-width="1.6" />
      </svg>
    </div>
    <div class="header__title">
      <h1>PARQUES BH</h1>
      <span class="header__sub">Atlas verde — áreas de lazer &amp; conservação de Belo Horizonte |
        <a style="color: lightblue;" href="https://github.com/liberstack">github.com/liberstack</a></span>
    </div>
    <div class="header__meta">
      <span id="clock" class="mono"></span>
    </div>
  </header>

  <main class="layout">

    <section class="map-wrap">
      <div id="map"></div>
    </section>

    <aside class="panel">

      <div class="filter-bar" id="filterBar"></div>

      <div class="detail" id="detail">
        <p class="detail__placeholder">Selecione um parque na lista ou clique num marcador no mapa.</p>
      </div>

      <div class="park-list">
        <h2 class="park-list__title">PARQUES CATALOGADOS <span class="mono" id="parkCount"></span></h2>
        <ul id="parkList" class="park-list__items"></ul>
      </div>

    </aside>

  </main>

  <footer class="footer mono">
    <span>Tiles: OpenStreetMap contributors — Dados: Fundação de Parques e Zoobotânica (PBH)</span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>

</html>
